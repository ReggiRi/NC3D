[mods]
[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
logoFile = "${mod_id}.png"
credits = "${credits}"
authors = "${mod_author}"
description = '''${description}'''
license = "${license}"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "geckolib"
    type = "required"
    versionRange = "[${geckolib_version}]"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "narrativecraft"
    type = "required"
    versionRange = "[${narrativecraft_version}]"
    ordering = "NONE"
    side = "BOTH"
